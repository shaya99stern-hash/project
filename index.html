<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#060606" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Siddur" />
    <meta name="description" content="A fast offline Siddur reader with page turns, search, saved texts, and daily prayer flow." />
    <title>Siddur</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar" aria-label="App header">
        <button class="icon-button" id="menuButton" aria-label="Open settings" type="button">
          <span></span><span></span>
        </button>
        <div class="brand-lockup">
          <div class="brand">SIDDUR</div>
          <div class="powered">Powered by NaviOS</div>
        </div>
        <button class="profile-button" id="profileButton" aria-label="Open profile" type="button">S</button>
      </header>

      <main class="content" id="app" aria-live="polite"></main>

      <nav class="tab-bar" aria-label="Bottom navigation">
        <button class="tab active" data-tab="home" type="button">
          <span aria-hidden="true">⌂</span>
          <strong>Home</strong>
        </button>
        <button class="tab" data-tab="texts" type="button">
          <span aria-hidden="true">☰</span>
          <strong>Texts</strong>
        </button>
        <button class="tab center-tab" data-tab="navi" aria-label="NaviOS guide" type="button">
          <span aria-hidden="true">✦</span>
        </button>
        <button class="tab" data-tab="daily" type="button">
          <span aria-hidden="true">◷</span>
          <strong>Daily</strong>
        </button>
        <button class="tab" data-tab="saved" type="button">
          <span aria-hidden="true">◇</span>
          <strong>Saved</strong>
        </button>
      </nav>
    </div>

    <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
    <aside class="settings-sheet" id="settingsSheet" aria-label="Reader settings" hidden>
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h2>Reader</h2>
        <button class="plain-button" id="closeSheetButton" type="button">Done</button>
      </div>
      <label class="setting-row">
        <span>Text size</span>
        <input id="fontSizeInput" type="range" min="16" max="25" step="1" />
      </label>
      <label class="setting-row switch-row">
        <span>Sepia paper</span>
        <input id="themeToggle" type="checkbox" />
      </label>
      <button class="danger-button" id="clearProgressButton" type="button">Clear saved progress</button>
    </aside>

    <script src="/app.js" type="module"></script>
  </body>
</html>
